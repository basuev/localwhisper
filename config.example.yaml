# LocalWhisper configuration

# Whisper model (speed/quality tradeoff):
#   mlx-community/whisper-large-v3-mlx       - best quality, ~2-4s per 5s chunk
#   mlx-community/whisper-large-v3-turbo       - good quality, ~1-2s per 5s chunk
#   mlx-community/whisper-small-mlx           - adequate quality, ~0.3s per 5s chunk
whisper_model: "mlx-community/whisper-large-v3-mlx"

# Language for Whisper
language: "ru"

# Ollama settings
ollama_model: "qwen2.5:7b"
ollama_url: "http://localhost:11434"

# Post-processor backend: "ollama" (default) or "openai"
# postprocessor: "ollama"

# OpenAI model (used when postprocessor is "openai", requires ChatGPT Plus login)
# openai_model: "gpt-5.4"

# Translation: null = off, or target language name like "English", "Japanese"
# translate_to: null

# Hotkey: keycode for Right Option
hotkey_keycode: 61

# Model idle timeout in seconds (unload after this period of inactivity)
model_idle_timeout: 300

# Input device: substring match by name or device index. None = system default.
# input_device: "MacBook"

# Microphone volume during recording (0-100), null = skip volume control for faster start
recording_volume: 100

# Post-processing: true = fix punctuation via LLM, false = raw whisper output (faster)
postprocess: true

# Streaming transcription: transcribe audio chunks during recording for near-instant results
streaming: true

# Chunk duration in seconds for streaming mode (5s works well for whisper)
chunk_duration: 5.0

# Sound feedback
sound_start: "/System/Library/Sounds/Tink.aiff"
sound_stop: "/System/Library/Sounds/Pop.aiff"
sound_error: "/System/Library/Sounds/Sosumi.aiff"
